# substrate-poc1 cluster-mode manifests (ate.dev/v1alpha1).
#
# Substrate's operator consumes WorkerPool + ActorTemplate and, on first
# request to a session-id, spawns one gVisor-sandboxed Actor pod, suspending
# idle actors via runsc + CRIU checkpoint/restore (snapshotsConfig.location)
# and resuming them on the next request. The suspend/resume cycle is what the
# PoC's dedup invariant (evalCount == 1 across client retries) is proven on.
#
# Field shapes verified live against the installed CRDs on substrate-demo-cluster
# (`kubectl explain actortemplates.spec --recursive`, group ate.dev/v1alpha1)
# and against the running mux-structural / ate-demo-counter examples.
#
# Pre-apply gates (NOT in this manifest's scope):
#   - ate-system operator running on substrate-demo-cluster (#782 — DONE, the
#     GKE-Standard rebuild via AlexBulankou/a PR #1053 resolved the alpha-API
#     CTB/PCR gap; ate-api-server/ate-controller/atelet/atenet-router up).
#   - Snapshot bucket gs://alexbu-gke-dev-d-substrate-poc1-snapshots created
#     (#460 — DONE) with object-admin for the actor's runtime identity.
#   - Agent image pushed to GAR (#461): the keyless-boot build serves
#     /v1/calculate + /health with NO GOOGLE_API_KEY (PR #14). The /api/ LLM
#     surface stays unmounted in cluster-mode — the dedup proof needs no Gemini.
---
apiVersion: v1
kind: Namespace
metadata:
  name: substrate-poc1
---
apiVersion: ate.dev/v1alpha1
kind: WorkerPool
metadata:
  name: poc1-pool
  namespace: substrate-poc1
spec:
  # ko:// form — the operator's ko resolver pins it to the GAR ateom-gvisor
  # digest at apply time (same resolution the live mux-pool underwent).
  ateomImage: ko://github.com/agent-substrate/substrate/cmd/ateom-gvisor
  replicas: 1
---
apiVersion: ate.dev/v1alpha1
kind: ActorTemplate
metadata:
  name: substrate-poc1-agent
  namespace: substrate-poc1
spec:
  containers:
    - name: agent
      image: us-central1-docker.pkg.dev/alexbu-gke-dev-d/substrate-poc1/agent@sha256:d2c15c7d66049f9d40830f674aee3ab18cb58679bf046f949a38f792768509e5
      command:
        - /agent
      env:
        - name: PORT
          value: "8080"
      ports:
        - name: http
          containerPort: 8080
  pauseImage: registry.k8s.io/pause:3.10.2@sha256:f548e0e8e3dc1896ca956272154dde3314e8cc4fde0a57577ee9fa1c63f5baf4
  runsc:
    amd64:
      url: gs://gvisor/releases/nightly/2026-05-19/x86_64/runsc
      sha256Hash: a397be1abc2420d26bce6c70e6e2ff96c73aaaab929756c56f5e2089ea842b63
    arm64:
      url: gs://gvisor/releases/nightly/2026-05-19/aarch64/runsc
      sha256Hash: 1ba2366ae2efceba166046f51a4104f9261c9cb72c6db8f5b3fe2dc57dea86b9
  snapshotsConfig:
    location: gs://alexbu-gke-dev-d-substrate-poc1-snapshots/agent/
  workerPoolRef:
    name: poc1-pool
    namespace: substrate-poc1
